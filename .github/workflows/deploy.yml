name: Build and push to cloud.ru

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Cloud.ru Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CLOUDRU_REGISTRY }}
          username: ${{ secrets.CLOUDRU_KEY_ID }}
          password: ${{ secrets.CLOUDRU_KEY_SECRET }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.CLOUDRU_REGISTRY }}/api-key-manager:latest
            ${{ secrets.CLOUDRU_REGISTRY }}/api-key-manager:${{ github.sha }}
